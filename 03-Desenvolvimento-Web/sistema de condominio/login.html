<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>
    <header align="center">
        <h1>🔐 Login</h1>
    </header>
    <hr>
    <main>
        <div align="center">
            <h2>Área de acesso</h2>
            <form method="get" action="/login" onsubmit="alert('e ai, galera')">
                <div>
                    <label><b>E-mail:</b></label>
                    <input type="email" name="login" required>
                </div>
                <div>
                    <label><b>Senha:</b></label>
                    <input type="password" name="senha" required>
                </div>
                <div>
                    <button type="submit">Entrar</button>
                </div>
            </form>
            <p><a href="sindicos_create.html">Cadastrar-se</a></p>
            <div id="error" style="color:red; display:none;">
                Usuário ou senha incorretos.
            </div>
        </div>
    </main>
    <hr>
    <footer align="center">
        <small>Sistema de Gestão do Condomínio</small>
    </footer>

    <script src="senha.js"></script>
    <script>
        /* validação inline do email e chamada da função externa de senha */
        function validateForm(form) {
            const email = form.login.value;
            if (!validateEmail(email)) {
                alert('Por favor, digite um e-mail válido.');
                return false;
            }

            if (!validatePassword(form.senha.value)) {
                alert("As senhas por aqui devem ter pelo menos 6 caracteres");
                return false;
            }

            return true;
        }
        /* mostra o erro caso venha um parâmetro "fail" na querystring */
        window.addEventListener('DOMContentLoaded', function() {
            const params = new URLSearchParams(window.location.search);
            if (params.has('fail')) {
                document.getElementById('error').style.display = 'block';
            }
        });
    </script>
</body>
</html>
